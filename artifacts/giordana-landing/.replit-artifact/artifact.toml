kind = "web"
previewPath = "/"
title = "Giordana Gonçalves — Advogada"
version = "1.0.0"
id = "artifacts/giordana-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25266

[services.development]
run = "pnpm --filter @workspace/giordana-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/giordana-landing", "run", "build" ]
publicDir = "artifacts/giordana-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25266"
BASE_PATH = "/"
